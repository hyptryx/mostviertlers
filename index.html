<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mostviertler Streaming Team</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Orbitron Schrift -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
  <script defer src="cookie.js"></script>
</head>

<body>

  <!-- GOLD ORBS BACKGROUND -->
  <div class="orbs">
    <div class="orb big" style="top: 10%; left: 15%; animation-duration: 18s;"></div>
    <div class="orb big" style="top: 60%; left: 70%; animation-duration: 22s;"></div>
    <div class="orb small" style="top: 30%; left: 80%; animation-duration: 14s;"></div>
    <div class="orb small" style="top: 75%; left: 25%; animation-duration: 16s;"></div>
    <div class="orb small" style="top: 50%; left: 45%; animation-duration: 12s;"></div>
  </div>

  <!-- HERO -->
  <header class="hero">

    <!-- LOGO -->
    <img src="img/mostviertler-logo.png" class="hero-logo">
    
    <!-- TITEL -->
    <h1 class="hero-title">Mostviertler Streaming Team</h1>

    <!-- BANNER -->
    <img src="img/bannermosti.png" class="hero-banner">

  </header>

  <!-- TEAM SECTION -->
  <section class="team">
    <h2 class="section-title">Wir sind HyptryX & Tommecs</h2>

    <div class="team-grid">

      <a href="https://twitch.tv/hyptryx" target="_blank" class="team-link">
  <div class="team-card">
      <img src="img/hyptryx.png" class="team-avatar">
      <h3>HyptryX</h3>
      <div class="live-status" id="status-hyptryx">Loading…</div>
      <p>Streamer & Creator</p>
  </div>
</a>

<a href="https://twitch.tv/tommecs" target="_blank" class="team-link">
  <div class="team-card">
      <img src="img/tommecs.png" class="team-avatar">
      <h3>Tommecs</h3>
      <div class="live-status" id="status-tommecs">Loading…</div>
      <p>Streamer & Creator</p>
  </div>
</a>

    </div>
  </section>

  <!-- TWITCH VOD SECTION -->
  <section class="vod-section">
  <h2 class="section-title">Unsere Twitch Kanäle</h2>

  <div class="vod-grid">

    <!-- HyptryX -->
    <div class="vod-card">
      <img src="img/hyptryx.png" class="vod-avatar">
      <iframe
        src="https://player.twitch.tv/?video=2794184335&parent=hyptryx.github.io"
        height="360"
        width="640"
        allowfullscreen>
      </iframe>
    </div>

    <!-- Tommecs -->
    <div class="vod-card">
      <img src="img/tommecs.png" class="vod-avatar">
      <iframe
        src="https://player.twitch.tv/?video=2766880312&parent=hyptryx.github.io"
        height="360"
        width="640"
        allowfullscreen>
      </iframe>
    </div>

  </div>
</section>

  <!-- STREAMING PLÄNE -->
  <section class="plans">
    <h2 class="section-title">Streamingpläne</h2>

    <div class="plan-grid">

      <div class="plan-box">
        <h3 class="plan-title">HyptryX</h3>
        <img src="img/hyptryxplan.PNG" class="plan-img">
      </div>

      <div class="plan-box">
        <h3 class="plan-title">Tommecs</h3>
        <img src="img/tommecsplan.PNG" class="plan-img">
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© <span id="year"></span> Mostviertler Streaming Team</p>
    <p>
      <a href="datenschutz.html">Datenschutz</a> ·
      <a href="impressum.html">Impressum</a>
    </p>
  </footer>

</body>
</html>
